<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - UCIL</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<style>
  body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #2e2e38;
    font-family: var(--font-sans);
  }

  .login-container {
    background: var(--bg-primary);
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    width: 100%;
    max-width: 420px;
    padding: 48px 40px;
    margin: 20px;
  }

  .login-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .login-logo {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .login-title {
    font-size: 28px;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 8px;
  }

  .login-subtitle {
    font-size: 14px;
    color: var(--text-secondary);
  }

  .form-group {
    margin-bottom: 24px;
  }

  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 8px;
  }

  .form-input {
    width: 100%;
    padding: 12px 16px;
    font-size: 14px;
    border: 1.5px solid var(--border-s);
    border-radius: 8px;
    background: var(--bg-secondary);
    color: var(--text-primary);
    transition: all 0.2s;
    box-sizing: border-box;
  }

  .form-input:focus {
    outline: none;
    border-color: var(--text-info);
    background: var(--bg-primary);
  }

  .form-input::placeholder {
    color: var(--text-tertiary);
  }

  .btn-login {
    width: 100%;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    color: #2e2e38;
    background: #ffe600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .btn-login:hover {
    background: #e6cf00;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(255, 230, 0, 0.3);
  }

  .btn-login:active {
    transform: translateY(0);
  }

  .btn-login:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .error-message {
    background: var(--bg-danger);
    border: 1px solid var(--border-danger);
    color: var(--text-danger);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
  }

  .error-message.show {
    display: block;
  }

  .remember-forgot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    font-size: 13px;
  }

  .remember-me {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-secondary);
  }

  .remember-me input[type="checkbox"] {
    width: 16px;
    height: 16px;
    cursor: pointer;
  }

  .forgot-password {
    color: #ffe600;
    text-decoration: none;
    font-weight: 500;
  }

  .forgot-password:hover {
    text-decoration: underline;
  }



  .loading-spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 8px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="login-container">
  <div class="login-header">
    <div class="login-logo">🔐</div>
    <div class="login-title">Welcome Back</div>
    <div class="login-subtitle">Unified Control Intelligence Layer</div>
  </div>

  <div id="error-message" class="error-message"></div>

  <form id="login-form" onsubmit="handleLogin(event)">
    <div class="form-group" id="name-group" style="display:none">
      <label class="form-label" for="name">Full Name</label>
      <input 
        type="text" 
        id="name" 
        class="form-input" 
        placeholder="First Last"
        autocomplete="name"
      >
    </div>

    <div class="form-group" id="role-group" style="display:none">
      <label class="form-label" for="role">User Role</label>
      <select id="role" class="form-input" style="height:46px;color:var(--text-primary);background:var(--bg-secondary);border:1.5px solid var(--border-s);border-radius:8px;width:100%;box-sizing:border-box;padding:0 16px">
        <option value="Compliance Lead">Compliance Lead</option>
        <option value="Control Owner">Control Owner</option>
        <option value="Domain Head">Domain Head</option>
        <option value="CISO">CISO</option>
        <option value="Admin">Admin</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label" for="email">Email Address</label>
      <input 
        type="email" 
        id="email" 
        class="form-input" 
        placeholder="you@company.com"
        required
        autocomplete="email"
      >
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input 
        type="password" 
        id="password" 
        class="form-input" 
        placeholder="Enter your password"
        required
        autocomplete="current-password"
      >
    </div>

    <div class="remember-forgot">
      <label class="remember-me">
        <input type="checkbox" id="remember">
        <span>Remember me</span>
      </label>
      <a href="#" class="forgot-password">Forgot password?</a>
    </div>

    <button type="submit" class="btn-login" id="login-btn">
      Sign In
    </button>

    <div style="margin-top:20px;text-align:center;font-size:13px;color:var(--text-secondary)" id="toggle-text">
      Don't have an account? <a href="#" onclick="toggleMode(event)" style="color:#ffe600;text-decoration:none;font-weight:600">Create one</a>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase/supabase-client.js"></script>
<script>
let isSignUpMode = false;

function toggleMode(event) {
  event.preventDefault();
  isSignUpMode = !isSignUpMode;
  
  const title = document.querySelector('.login-title');
  const loginBtn = document.getElementById('login-btn');
  const toggleLink = document.querySelector('#toggle-text a');
  const togglePrefix = document.querySelector('#toggle-text').childNodes[0];
  const nameGroup = document.getElementById('name-group');
  const roleGroup = document.getElementById('role-group');
  const rememberForgot = document.querySelector('.remember-forgot');
  const errorMsg = document.getElementById('error-message');
  
  errorMsg.classList.remove('show');
  errorMsg.textContent = '';
  
  if (isSignUpMode) {
    title.textContent = 'Create Account';
    loginBtn.textContent = 'Sign Up';
    togglePrefix.textContent = 'Already have an account? ';
    toggleLink.textContent = 'Sign In';
    nameGroup.style.display = 'block';
    roleGroup.style.display = 'block';
    rememberForgot.style.display = 'none';
    document.getElementById('name').required = true;
  } else {
    title.textContent = 'Welcome Back';
    loginBtn.textContent = 'Sign In';
    togglePrefix.textContent = "Don't have an account? ";
    toggleLink.textContent = 'Create one';
    nameGroup.style.display = 'none';
    roleGroup.style.display = 'none';
    rememberForgot.style.display = 'flex';
    document.getElementById('name').required = false;
  }
}

async function handleLogin(event) {
  event.preventDefault();
  
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const loginBtn = document.getElementById('login-btn');
  const errorMsg = document.getElementById('error-message');
  
  // Clear previous errors
  errorMsg.classList.remove('show');
  errorMsg.textContent = '';
  
  // Disable button and show loading
  loginBtn.disabled = true;
  loginBtn.innerHTML = isSignUpMode 
    ? '<span class="loading-spinner"></span>Creating account...'
    : '<span class="loading-spinner"></span>Signing in...';
  
  try {
    if (isSignUpMode) {
      const fullName = document.getElementById('name').value;
      const role = document.getElementById('role').value;
      
      // Attempt Signup
      await signUpUser(email, password, fullName, role);
      
      // Auto-login after signup
      const user = await login(email, password);
      if (user) {
        window.location.href = 'index.html';
      }
    } else {
      // Attempt login
      const user = await login(email, password);
      if (user) {
        window.location.href = 'index.html';
      }
    }
  } catch (error) {
    // Show error message
    errorMsg.textContent = error.message || 'An error occurred. Please try again.';
    errorMsg.classList.add('show');
    
    // Re-enable button
    loginBtn.disabled = false;
    loginBtn.innerHTML = isSignUpMode ? 'Sign Up' : 'Sign In';
  }
}

// Check if already logged in
window.addEventListener('DOMContentLoaded', async () => {
  const session = await getCurrentSession();
  if (session) {
    // Already logged in, redirect to dashboard
    window.location.href = 'index.html';
  }
});
</script>

</body>
</html>
