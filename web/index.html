<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unified Control Intelligence Layer</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>

<div class="app-shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-name">Control Intelligence</div>
      <div class="brand-sub">Unified Control Layer</div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-group">
        <div class="nav-group-label">Overview</div>
        <button class="nav-item active" data-page="dashboard">
          <span class="nav-icon">◈</span><span>Dashboard</span>
        </button>
      </div>

      <div class="nav-group">
        <div class="nav-group-label">Core Modules</div>
        <button class="nav-item" data-page="library">
          <span class="nav-icon">▦</span><span>Unified Library</span>
        </button>
        <button class="nav-item" data-page="evidence">
          <span class="nav-icon">📁</span><span>Evidence Management</span>
        </button>
        <button class="nav-item" data-page="queue">
          <span class="nav-icon">✓</span><span>SME Review Queue</span>
          <span class="nav-badge" id="badge-queue">6</span>
        </button>
        <button class="nav-item" data-page="ingest">
          <span class="nav-icon">⬇</span><span>Data Ingestion</span>
        </button>
      </div>

      <div class="nav-group">
        <div class="nav-group-label">Reports</div>
        <button class="nav-item" data-page="gaps">
          <span class="nav-icon">△</span><span>Gap Analysis</span>
        </button>
        <button class="nav-item" data-page="regulatory">
          <span class="nav-icon">⚡</span><span>Reg. Change Impact</span>
        </button>
        <button class="nav-item" data-page="domainhead">
          <span class="nav-icon">🏛</span><span>Domain Head View</span>
        </button>
      </div>

      <div class="nav-group">
        <div class="nav-group-label">System</div>
        <button class="nav-item" data-page="notifications">
          <span class="nav-icon">🔔</span><span>Notifications</span>
        </button>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="sidebar-avatar">SS</div>
        <div>
          <div class="user-name" id="sidebar-name">Sanket Sondawle</div>
          <div class="user-role" id="sidebar-role">Compliance Lead</div>
        </div>
      </div>
      <button class="btn btn-sm" onclick="handleLogout()" style="width:100%;margin-top:12px;background:var(--bg-danger);color:var(--text-danger);border:1px solid var(--border-danger);padding:8px;font-size:12px;font-weight:600;border-radius:6px;cursor:pointer;">
        🚪 Logout
      </button>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="main-area">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-title" id="page-title">Executive Dashboard</div>
        <nav class="breadcrumb" id="breadcrumb">
          <span>Dashboard</span>
        </nav>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="window.print()">Export Report</button>
      </div>
    </header>

    <!-- Loading overlay -->
    <div id="app-loading" style="position:absolute;inset:0;background:var(--bg-primary);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px">
      <div style="font-size:13px;font-weight:600;color:var(--text-primary)">Loading Control Intelligence…</div>
      <div style="font-size:11px;color:var(--text-secondary)" id="loading-status">Connecting to database…</div>
    </div>

    <main class="page-content" id="page-content">
    </main>
  </div>

</div>

<!-- 1. Supabase SDK first -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<!-- 2. Supabase client (sets up sb, fetch functions) -->
<script src="js/supabase/supabase-client.js"></script>
<!-- 3. Data store (DATA object — used as fallback and for queue/mappings) -->
<script src="js/data.js"></script>
<!-- 4. Shared component builders -->
<script src="js/components.js"></script>
<!-- 5. Pages -->
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/ingest.js"></script>
<script src="js/pages/evidence.js"></script>
<script src="js/pages/gaps.js"></script>
<script src="js/pages/regulatory.js"></script>
<script src="js/pages/conflicts.js"></script>
<script src="js/pages/domainhead.js"></script>
<script src="js/pages/notifications.js"></script>
<!-- 6. Router last -->
<script src="js/router.js"></script>
</body>
</html>
